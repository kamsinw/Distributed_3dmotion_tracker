<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MPU Paint</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: #0f0f1e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar span { font-size: 0.7rem; color: #5a7898; letter-spacing: .1em; }

    .tb-label { font-size: 0.62rem; color: #445; text-transform: uppercase; }

    input[type=color] {
      width: 32px; height: 28px;
      border: none; border-radius: 3px;
      cursor: pointer; padding: 0;
      background: none;
    }

    input[type=range] { width: 80px; cursor: pointer; accent-color: #4af; }

    button {
      padding: 5px 14px;
      border: 1px solid #334;
      border-radius: 3px;
      background: #1a2030;
      color: #9cf;
      font-size: 0.7rem;
      cursor: pointer;
      letter-spacing: .08em;
      transition: background .15s;
    }
    button:hover { background: #253050; }
    button.active { background: #1a4030; border-color: #2a8; color: #4fa; }

    #status {
      margin-left: auto;
      font-size: 0.65rem;
      color: #445;
    }
    #status.live { color: #4a8; }

    #canvas-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    canvas {
      background: #fff;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
      cursor: none;
      display: block;
    }

    #cursor-dot {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #000;
      background: transparent;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 30ms linear, top 30ms linear;
    }

    #debug {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.75);
      color: #0f0;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.8;
      pointer-events: none;
      min-width: 220px;
    }
    #debug .label { color: #888; }
    #debug .bad   { color: #f44; }
    #debug .good  { color: #4f4; }
    #debug .warn  { color: #fa0; }
  </style>
</head>
<body>

<div id="toolbar">
  <span>MPU PAINT</span>

  <span class="tb-label">Color</span>
  <input type="color" id="color-pick" value="#000000" />

  <span class="tb-label">Size</span>
  <input type="range" id="size-pick" min="1" max="30" value="4" />
  <span id="size-val">4px</span>

  <button id="btn-pen" class="active">✏ Draw</button>
  <button id="btn-cal">⊕ Calibrate</button>
  <button id="btn-clear">✕ Clear</button>

  <div id="status">waiting for sensor…</div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="cursor-dot"></div>
</div>

<div id="debug">
  <div><span class="label">socket  </span> <span id="dbg-ws"    class="bad">disconnected</span></div>
  <div><span class="label">ESP32   </span> <span id="dbg-esp"   class="bad">no data yet</span></div>
  <div><span class="label">ultra   </span> <span id="dbg-ultra" class="bad">—</span></div>
  <div><span class="label">events  </span> <span id="dbg-evt">0</span> /s</div>
  <div><span class="label">roll    </span> <span id="dbg-roll">—</span> rad</div>
  <div><span class="label">pitch   </span> <span id="dbg-pitch">—</span> rad</div>
  <div><span class="label">dist    </span> <span id="dbg-dist">—</span> cm</div>
  <div><span class="label">speed   </span> <span id="dbg-speed">—</span> cm/s</div>
  <div><span class="label">canvas  </span> <span id="dbg-xy">—</span> px</div>
  <div><span class="label">pen     </span> <span id="dbg-pen">down</span></div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
(function () {

  const wrap   = document.getElementById("canvas-wrap");
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  const dot    = document.getElementById("cursor-dot");

  function resizeCanvas() {
    const pad = 32;
    const w = wrap.clientWidth  - pad * 2;
    const h = wrap.clientHeight - pad * 2;
    const tmp = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width  = Math.max(w, 100);
    canvas.height = Math.max(h, 100);
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.putImageData(tmp, 0, 0);
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const dbg = {
    ws:    document.getElementById("dbg-ws"),
    esp:   document.getElementById("dbg-esp"),
    ultra: document.getElementById("dbg-ultra"),
    evt:   document.getElementById("dbg-evt"),
    roll:  document.getElementById("dbg-roll"),
    pitch: document.getElementById("dbg-pitch"),
    dist:  document.getElementById("dbg-dist"),
    speed: document.getElementById("dbg-speed"),
    xy:    document.getElementById("dbg-xy"),
    pen:   document.getElementById("dbg-pen"),
  };

  let _evtCount = 0, _evtRate = 0;
  setInterval(() => {
    _evtRate = _evtCount;
    _evtCount = 0;
    dbg.evt.textContent = _evtRate;
    dbg.evt.className = _evtRate > 0 ? "good" : "warn";
  }, 1000);

  const colorPick = document.getElementById("color-pick");
  const sizePick  = document.getElementById("size-pick");
  const sizeVal   = document.getElementById("size-val");
  const btnPen    = document.getElementById("btn-pen");
  const btnClear  = document.getElementById("btn-clear");
  const status    = document.getElementById("status");

  sizePick.addEventListener("input", () => {
    sizeVal.textContent = sizePick.value + "px";
  });

  let _manualPen = true;
  let _ultraPen  = true;
  let penDown    = true;

  const PEN_LIFT_CM   = 5;
  const PEN_RESUME_CM = 4; // hysteresis so pen doesn't chatter

  const SWIPE_SPEED_CM_S = 60;
  const UNDO_COOLDOWN_MS = 1500;
  let _lastUndoTime = 0;

  const MAX_HISTORY = 20;
  const _strokeHistory = [];

  btnPen.addEventListener("click", () => {
    _manualPen = !_manualPen;
    btnPen.textContent = _manualPen ? "✏ Draw" : "✋ Lift";
    btnPen.classList.toggle("active", _manualPen);
    lastX = null; lastY = null;
  });

  btnClear.addEventListener("click", () => {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    _strokeHistory.length = 0;
    lastX = null; lastY = null;
    resetCursor();
  });

  let curX = canvas.width  / 2;
  let curY = canvas.height / 2;
  const SPEED = 250;
  const DT    = 1 / 20; // ~server broadcast rate

  function resetCursor() {
    curX = canvas.width  / 2;
    curY = canvas.height / 2;
  }

  let biasPitch = 0;
  let biasRoll  = 0;
  const CAL_SAMPLES = 30;
  let _calCount = 0, _calPSum = 0, _calRSum = 0;

  const btnCal = document.getElementById("btn-cal");
  btnCal.addEventListener("click", () => {
    _calCount = CAL_SAMPLES;
    _calPSum  = 0;
    _calRSum  = 0;
    btnCal.textContent = "⏳ Hold still…";
    btnCal.disabled    = true;
  });

  function applyBias(rawPitch, rawRoll) {
    if (_calCount > 0) {
      _calPSum += rawPitch;
      _calRSum += rawRoll;
      _calCount--;
      if (_calCount === 0) {
        biasPitch = _calPSum / CAL_SAMPLES;
        biasRoll  = _calRSum / CAL_SAMPLES;
        btnCal.textContent = "⊕ Calibrate";
        btnCal.disabled    = false;
        lastX = null; lastY = null;
      }
    }
    return { pitch: rawPitch - biasPitch, roll: rawRoll - biasRoll };
  }

  let lastX = null, lastY = null;

  function draw(cx, cy) {
    if (!penDown) { lastX = cx; lastY = cy; return; }

    ctx.lineWidth   = parseInt(sizePick.value);
    ctx.strokeStyle = colorPick.value;
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";

    if (lastX === null) {
      const snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
      _strokeHistory.push(snap);
      if (_strokeHistory.length > MAX_HISTORY) _strokeHistory.shift();

      ctx.beginPath();
      ctx.arc(cx, cy, ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.fillStyle = colorPick.value;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(cx, cy);
      ctx.stroke();
    }
    lastX = cx;
    lastY = cy;
  }

  function moveDot(cx, cy) {
    const rect = canvas.getBoundingClientRect();
    dot.style.left = (rect.left + cx) + "px";
    dot.style.top  = (rect.top  + cy) + "px";
    dot.style.borderColor = colorPick.value;
  }

  const socket = io("http://localhost:5002", { // paint_server.py
    reconnectionDelay: 1000,
    reconnectionAttempts: Infinity,
  });

  socket.on("connect", () => {
    status.textContent = "live";
    status.className   = "live";
    dbg.ws.textContent = "connected";
    dbg.ws.className   = "good";
  });
  socket.on("disconnect", () => {
    status.textContent = "disconnected";
    status.className   = "";
    dbg.ws.textContent = "disconnected";
    dbg.ws.className   = "bad";
    lastX = null; lastY = null;
    resetCursor();
  });

  socket.on("paint_update", (data) => {
    _evtCount++;

    const roll  = parseFloat(data.x);
    const pitch = parseFloat(data.y);

    const isAlive = data.alive === true;
    dbg.esp.textContent = isAlive ? "connected ✓" : "waiting…";
    dbg.esp.className   = isAlive ? "good" : "warn";

    dbg.roll.textContent  = roll.toFixed(4);
    dbg.pitch.textContent = pitch.toFixed(4);

    const ultraAlive = data.ultra_alive === true;
    const absDist    = parseFloat(data.distance);
    const speed      = parseFloat(data.speed);

    dbg.ultra.textContent = ultraAlive ? "connected ✓" : "—";
    dbg.ultra.className   = ultraAlive ? "good" : "bad";

    if (ultraAlive && isFinite(absDist)) {
      dbg.dist.textContent  = absDist.toFixed(1);
      dbg.speed.textContent = isFinite(speed) ? speed.toFixed(1) : "—";

      if (absDist < PEN_LIFT_CM)   _ultraPen = false;
      if (absDist > PEN_RESUME_CM) _ultraPen = true;

      penDown = _ultraPen;
    } else {
      penDown = _manualPen;
    }

    btnPen.textContent = penDown ? "✏ Draw" : "✋ Lift";
    btnPen.classList.toggle("active", penDown);
    dbg.pen.textContent = penDown ? "down" : "up";

    if (!penDown) { lastX = null; lastY = null; }

    if (ultraAlive && isFinite(speed) && Math.abs(speed) > SWIPE_SPEED_CM_S) {
      const now = Date.now();
      if (now - _lastUndoTime > UNDO_COOLDOWN_MS && _strokeHistory.length > 0) {
        ctx.putImageData(_strokeHistory.pop(), 0, 0);
        lastX = null; lastY = null;
        _lastUndoTime = now;
      }
    }

    const b = applyBias(pitch, roll);

    curX += b.pitch * SPEED * DT;
    curY += b.roll  * SPEED * DT;
    curX  = Math.max(0, Math.min(canvas.width,  curX));
    curY  = Math.max(0, Math.min(canvas.height, curY));

    dbg.xy.textContent = `${Math.round(curX)}, ${Math.round(curY)}`;

    moveDot(curX, curY);
    draw(curX, curY);
  });

}());
</script>
</body>
</html>
