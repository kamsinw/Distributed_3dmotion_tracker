; Paint Node — ESP32 + MPU6050
; Stripped-down firmware: roll/pitch only, sent over TCP.
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
upload_port   = /dev/cu.usbserial-0001
monitor_port  = /dev/cu.usbserial-0001

build_flags =
    -DARDUINO_ARCH_ESP32
    -std=gnu++11
